name: Deploy to GitHub Pages

on:
  push:
    branches: [dotnet-workshop]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Verify .NET solution builds before deploying docs
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build solution
        run: dotnet build --configuration Release

      - name: Prepare deployment
        run: |
          mkdir -p ./_site
          cp -r docs/* ./_site/
          mkdir -p ./_site/workshop
          cp workshop/*.md ./_site/workshop/
          cp -r workshop/images ./_site/workshop/
          md_count=$(find workshop -maxdepth 1 -name '*.md' | wc -l)
          dest_md_count=$(find ./_site/workshop -maxdepth 1 -name '*.md' | wc -l)
          src_count=$(find workshop/images -type f | wc -l)
          dest_count=$(find ./_site/workshop/images -type f | wc -l)
          [ "$md_count" -gt 0 ] || { echo "No workshop markdown files found at workshop/."; exit 1; }
          [ "$md_count" -eq "$dest_md_count" ] || { echo "Markdown copy mismatch: source=$md_count destination=$dest_md_count."; exit 1; }
          [ "$src_count" -gt 0 ] || { echo "No source workshop images found at workshop/images."; exit 1; }
          [ "$src_count" -eq "$dest_count" ] || { echo "Image copy mismatch: source=$src_count destination=$dest_count."; exit 1; }
          touch ./_site/.nojekyll

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
